<!DOCTYPE html>
<html>
<head>
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Pomodoro Timer</h1>
    
    <p>A simple timer to help with focus sessions along with short breaks</p>

     <hr>

     <div>
        
        <h2>Current Timer</h2>

        <h1 id="timer">25:00</h1>

        <p id="status">Ready To Start</p>

    </div>
     
    <br>

    <div>

        <h2>Controls</h2>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>

    </div>  

    <br>

    <div>
        
        <h2>Modes</h2>
        <button onclick="setFocusMode()">Focus Mode</button>  
        <button onclick="setBreakMode()">Break Mode</button>

        <p>Focus Mode is for study or work time</p>

        <p>Break Mode is for taking a short rest</p>

    </div>

    <br>

    <div>

        <h2>Session Info</h2>

        <p>Completed Sessions: <span id="sessions">0</span> </p>

        <p>Current Mode: <span id="modeText">Focus</span> </p>
    
    </div>

    <br>

   
    
    <script src="script.js"></script>

</body>
</html>
